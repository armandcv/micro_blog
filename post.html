<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post — Mi Blog</title>
  <link rel="stylesheet" href="css/style.css" />
  <script>
    (function () {
      const stored = localStorage.getItem("blog-theme");
      const sys = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", stored || sys);
    })();
  </script>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-inner">
        <a href="index.html" class="site-title">Armandovc Blog´s</a>
        <div class="header-actions">
          <button class="theme-toggle" id="theme-toggle" aria-label="Cambiar tema">
            <span class="icon">🌙</span>
            <span class="label">Dark</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <a href="index.html" class="back-link">← Volver al inicio</a>

      <article>
        <header class="post-header" id="post-header">
          <!-- Populated by JS -->
        </header>
        <div class="post-body" id="post-body">
          <div class="loading">Cargando post…</div>
        </div>
      </article>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>Hecho con HTML, CSS y Markdown.</p>
      <p class="footer-copyright">
        &copy; <span id="footer-year"></span> Armando Velazco &mdash; armandovc@gmail.com
      </p>
      <p class="footer-license">
        <a rel="license" href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank" aria-label="Licencia Creative Commons BY-NC-SA 4.0">
          <img src="https://licensebuttons.net/l/by-nc-sa/4.0/80x15.png" alt="CC BY-NC-SA 4.0" width="80" height="15" />
        </a>
        El contenido de este blog está bajo licencia
        <a rel="license" href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank">CC BY-NC-SA 4.0</a>.
      </p>
    </div>
  </footer>

  <script>
    document.getElementById("footer-year").textContent = new Date().getFullYear();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
