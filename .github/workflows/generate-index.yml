name: Generate posts index

on:
  push:
    branches: [main]
    paths:
      - "posts/**.md"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate posts.json
        run: |
          python3 - <<'EOF'
          import os, json, re
          from datetime import date

          POSTS_DIR = "posts"
          OUTPUT = os.path.join(POSTS_DIR, "posts.json")

          def parse_frontmatter(text):
              match = re.match(r"^---\n(.*?)\n---", text, re.DOTALL)
              if not match:
                  return {}
              meta = {}
              for line in match.group(1).splitlines():
                  if ":" not in line:
                      continue
                  key, _, value = line.partition(":")
                  value = value.strip().strip('"\'')
                  if value.startswith("[") and value.endswith("]"):
                      meta[key.strip()] = [v.strip() for v in value[1:-1].split(",") if v.strip()]
                  else:
                      meta[key.strip()] = value
              return meta

          def excerpt_from_body(text):
              # Strip frontmatter
              body = re.sub(r"^---\n.*?\n---\n?", "", text, flags=re.DOTALL)
              # Remove headings and blank lines, take first paragraph
              lines = [l for l in body.splitlines() if l.strip() and not l.startswith("#")]
              first = lines[0] if lines else ""
              # Remove markdown bold/italic/links
              first = re.sub(r"\*{1,2}(.+?)\*{1,2}", r"\1", first)
              first = re.sub(r"\[(.+?)\]\(.+?\)", r"\1", first)
              return first[:160] + ("…" if len(first) > 160 else "")

          posts = []
          for fname in os.listdir(POSTS_DIR):
              if not fname.endswith(".md"):
                  continue
              slug = fname[:-3]
              path = os.path.join(POSTS_DIR, fname)
              with open(path, encoding="utf-8") as f:
                  content = f.read()
              meta = parse_frontmatter(content)
              post = {
                  "slug": slug,
                  "title": meta.get("title", slug),
                  "date": meta.get("date", str(date.today())),
              }
              if "excerpt" in meta:
                  post["excerpt"] = meta["excerpt"]
              else:
                  generated = excerpt_from_body(content)
                  if generated:
                      post["excerpt"] = generated
              if "tags" in meta:
                  post["tags"] = meta["tags"]
              posts.append(post)

          posts.sort(key=lambda p: p["date"], reverse=True)

          with open(OUTPUT, "w", encoding="utf-8") as f:
              json.dump(posts, f, ensure_ascii=False, indent=2)

          print(f"Generated {OUTPUT} with {len(posts)} post(s).")
          EOF

      - name: Commit posts.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/posts.json
          git diff --cached --quiet && echo "No changes." || git commit -m "chore: regenerate posts.json"
          git push
